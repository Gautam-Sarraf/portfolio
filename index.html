<!doctype html>
<html lang="en" style="background:#050510;color:#e0e8ff">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Critical inline style: ensures dark bg even if CSS/fonts fail to load -->
    <style>html,body{background:#050510!important;color:#e0e8ff;margin:0;padding:0}#root{min-height:100vh;background:#050510}</style>

    <!-- Primary SEO -->
    <title>Gautam Sarraf | Full Stack Developer & AI Engineer</title>
    <meta name="description" content="Gautam Sarraf — Full Stack Developer, AI Engineer & Backend Architect from Nepal. Specializing in React, Node.js, Python, AI/ML systems, and automation." />
    <meta name="keywords" content="Gautam Sarraf, Full Stack Developer, AI Engineer, React Developer, Backend Developer, Python Developer, Node.js, Nepal, GLA University" />
    <meta name="author" content="Gautam Sarraf" />
    <meta name="robots" content="index, follow" />

    <!-- OpenGraph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gautam-sarraf.github.io/" />
    <meta property="og:title" content="Gautam Sarraf | Full Stack Developer & AI Engineer" />
    <meta property="og:description" content="World-class developer portfolio showcasing AI systems, Full Stack apps, backend architecture and automation platforms." />
    <meta property="og:image" content="https://gautam-sarraf.github.io/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gautam Sarraf | Full Stack Developer & AI Engineer" />
    <meta name="twitter:description" content="Explore Gautam Sarraf's world-class developer portfolio — AI Engineer, Full Stack Dev, Backend Architect." />

    <!-- Fonts (loaded as stylesheet link — more resilient than CSS @import) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" /></noscript>

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Gautam Sarraf",
      "url": "https://gautam-sarraf.github.io",
      "jobTitle": "Full Stack Developer & AI Engineer",
      "worksFor": { "@type": "Organization", "name": "Freelance" },
      "sameAs": [
        "https://github.com/gautam-sarraf",
        "https://linkedin.com/in/gautam-sarraf"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

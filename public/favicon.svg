<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffd8" />
      <stop offset="100%" stop-color="#00ff88" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="24" fill="#03040f" stroke="url(#cyber-grad)" stroke-width="4"/>
  <!-- Terminal Prompt Symbol >_ -->
  <path d="M 30,30 L 55,50 L 30,70" fill="none" stroke="url(#cyber-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  <rect x="62" y="62" width="16" height="8" fill="url(#cyber-grad)" rx="2" filter="url(#glow)" />
</svg>
